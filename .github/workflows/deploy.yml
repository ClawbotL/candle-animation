name: Deploy to Devpod
on:
  push:
    branches: [ main ]
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy static files to Devpod
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEVPOD_HOST }}
          username: ${{ secrets.DEVPOD_USER }}
          key: ${{ secrets.DEVPOD_SSH_KEY }}
          port: 22
          source: "*.html,*.css,*.js,assets/*"
          target: "/var/www/candle-animation/"
          strip_components: 0

      - name: Restart web server on Devpod (optional)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEVPOD_HOST }}
          username: ${{ secrets.DEVPOD_USER }}
          key: ${{ secrets.DEVPOD_SSH_KEY }}
          port: 22
          script: |
            sudo chown -R www-data:www-data /var/www/candle-animation/
            sudo systemctl reload nginx || echo "No nginx, assuming static server already running"
