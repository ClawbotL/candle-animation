name: Tests

on:
  push:
    branches: [main master]
  pull_request:
    branches: [main master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm install playwright
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 'false'

      - run: npx playwright install chromium

      - run: node test.js
        working-directory: .