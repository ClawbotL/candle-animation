<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Burning Candle</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0a0806;
      --candle: #f0dfc4;
      --candle-mid: #e0cba0;
      --candle-deep: #c4a870;
      --wick: #1a1208;
      --glow-warm: rgba(255, 175, 80, 0.18);
    }

    /* Flame turbulence effect */
    @keyframes turbulenceAnim {
      0% { baseFrequency: 0.01 0.02; }
      25% { baseFrequency: 0.02 0.04; }
      50% { baseFrequency: 0.015 0.03; }
      75% { baseFrequency: 0.025 0.035; }
      100% { baseFrequency: 0.01 0.02; }
    }

    body {
      min-height: 100vh;
      min-height: 100dvh;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
      /* Subtle textured wall background */
      background-image: 
        radial-gradient(circle at 20% 30%, rgba(255,180,80,0.03) 0%, transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(200,100,20,0.02) 0%, transparent 40%),
        url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='wallNoise' x='0' y='0'%3E%3CfeTurbulence baseFrequency='0.4' numOctaves='3' stitchTiles='stitch'/%3E%3CfeColorMatrix type='saturate' values='0'/%3E%3CfeComponentTransfer%3E%3CfeFuncA type='linear' slope='0.05'/%3E%3C/feComponentTransfer%3E%3C/filter%3E%3Crect width='400' height='400' filter='url(%23wallNoise)'/%3E%3C/svg%3E");
    }

    /* SVG for noise texture */
    svg.texture-svg { position: absolute; width: 0; height: 0; }

    /* Room ambience — warm bounce light from candle */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 70% 60% at 50% 55%, rgba(255,165,60,0.08) 0%, transparent 55%),
        radial-gradient(ellipse 40% 30% at 50% 70%, rgba(200,120,40,0.05) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    /* Dynamic wall shadows cast by flickering candle */
    .wall-shadows {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      opacity: 0.3;
      mix-blend-mode: multiply;
      animation: wallShadows 3.2s ease-in-out infinite;
    }

    .wall-shadows.extinguished {
      opacity: 0.05;
      animation: none;
    }

    @keyframes wallShadows {
      0%,100% { background: radial-gradient(ellipse at 52% 60%, transparent 0%, rgba(0,0,0,0.4) 40%); }
      25% { background: radial-gradient(ellipse at 54% 58%, transparent 0%, rgba(0,0,0,0.5) 40%); }
      50% { background: radial-gradient(ellipse at 48% 62%, transparent 0%, rgba(0,0,0,0.35) 40%); }
      75% { background: radial-gradient(ellipse at 46% 59%, transparent 0%, rgba(0,0,0,0.45) 40%); }
    }

    /* Dark vignette framing */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 0%, rgba(10,8,6,0.25) 45%, rgba(10,8,6,0.65) 85%);
      pointer-events: none;
      z-index: 3;
    }

    /* ─── Surface (table/window sill) ─── */
    .surface {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 28vh;
      background:
        /* subtle wood grain suggestion */
        repeating-linear-gradient(
          92deg,
          transparent,
          transparent 40px,
          rgba(255,220,160,0.018) 40px,
          rgba(255,220,160,0.018) 80px
        ),
        linear-gradient(to bottom, #0f0c08 0%, #0c0a07 100%);
      z-index: 0;
    }

    /* Dynamic candle light cast on holder */
    .holder-base::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% -20%, rgba(255,180,80,0.18), transparent 60%);
      border-radius: 50%;
      pointer-events: none;
      animation: holderGlow 2.5s ease-in-out infinite;
    }

    @keyframes holderGlow {
      0%,100% { opacity: 0.8; transform: scaleX(1); }
      30% { opacity: 1; transform: scaleX(1.05); }
      70% { opacity: 0.6; transform: scaleX(0.95); }
    }

    /* ─── Candle Holder ─── */
    .candle-holder {
      position: relative;
      z-index: 1;
      margin-top: -10px;
    }

    .holder-base {
      width: 120px;
      height: 20px;
      background: linear-gradient(135deg, #4a3f2e 0%, #2d2518 50%, #1a150f 100%);
      border-radius: 50%;
      box-shadow:
        inset 0 -8px 20px rgba(0,0,0,0.6),
        inset 0 4px 10px rgba(255,255,255,0.05),
        0 10px 30px rgba(0,0,0,0.8);
    }

    .holder-drip-catch {
      position: absolute;
      top: 5px;
      left: 50%;
      transform: translateX(-50%);
      width: 90px;
      height: 15px;
      background: radial-gradient(ellipse at 50% 50%, #3d3324 0%, #251e15 100%);
      border-radius: 50%;
      box-shadow: inset 0 2px 8px rgba(0,0,0,0.5);
    }

    .surface::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(to right, transparent, rgba(255,180,80,0.16) 30%, rgba(255,180,80,0.16) 70%, transparent);
    }

    /* ─── Candle Flicker Shadow on surface ─── */
    .candle-flicker-shadow {
      position: absolute;
      bottom: 18vh;
      left: 50%;
      transform: translateX(-50%);
      width: 160px;
      height: 20px;
      background: radial-gradient(ellipse at center top, rgba(0,0,0,0.72) 0%, rgba(0,0,0,0.32) 50%, transparent 80%);
      border-radius: 50%;
      animation: flickerShadow 2.1s ease-in-out infinite;
      pointer-events: none;
      z-index: 1;
      transition: opacity 800ms ease;
    }

    .candle-flicker-shadow.extinguished { opacity: 0.08; animation: none; }

    @keyframes flickerShadow {
      0%,100% { opacity: 0.75; transform: translateX(-50%) scaleX(1); }
      18%  { opacity: 0.92; transform: translateX(calc(-50% + 2px)) scaleX(1.04); }
      42%  { opacity: 0.58; transform: translateX(calc(-50% - 3px)) scaleX(0.94); }
      64%  { opacity: 0.86; transform: translateX(calc(-50% + 4px)) scaleX(1.06); }
      82%  { opacity: 0.68; transform: translateX(calc(-50% - 1px)) scaleX(0.97); }
    }

    /* ─── Ambient Warm Glow ─── */
    .ambient-glow {
      position: fixed;
      top: 15%;
      left: 50%;
      transform: translateX(-50%);
      width: 650px;
      height: 550px;
      background: radial-gradient(
        ellipse at 50% 80%,
        rgba(255,165,60,0.25) 0%,
        rgba(240,130,40,0.12) 20%,
        rgba(220,90,20,0.05) 40%,
        transparent 65%
      );
      pointer-events: none;
      z-index: 1;
      animation: ambientPulse 4.8s ease-in-out infinite;
      transition: opacity 900ms ease;
      mix-blend-mode: screen;
    }

    .ambient-glow.extinguished { opacity: 0.05; animation: none; }

    @keyframes ambientPulse {
      0%,100% { opacity: 0.85; transform: translateX(-50%) scale(1); }
      50%      { opacity: 1;    transform: translateX(-50%) scale(1.07); }
    }

    /* ─── Candle Assembly ─── */
    .candle-assembly {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ─── Flame Area ─── */
    .flame-area {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Continuous wispy smoke while burning */
    .continuous-smoke {
      position: absolute;
      top: -60px;
      left: 50%;
      transform: translateX(-50%);
      width: 40px;
      height: 100px;
      pointer-events: none;
      opacity: 0.18;
      filter: blur(3px);
      transition: opacity 600ms ease;
    }

    .continuous-smoke.extinguished { opacity: 0; }

    .continuous-smoke-particle {
      position: absolute;
      width: 100%;
      height: 100%;
      background: radial-gradient(ellipse at 50% 70%, rgba(200,190,180,0.55), transparent 70%);
      border-radius: 50%;
      animation: continuousWisp 4.5s ease-out infinite;
    }

    .continuous-smoke-particle:nth-child(2) { animation-delay: 1.5s; opacity: 0.75; }
    .continuous-smoke-particle:nth-child(3) { animation-delay: 3s; opacity: 0.55; }

    @keyframes continuousWisp {
      0%   { transform: translateX(-50%) translateY(0) scaleX(1) scaleY(0.8); opacity: 0; }
      10%  { opacity: 1; }
      100% { transform: translateX(calc(-50% + 12px)) translateY(-80px) scaleX(1.9) scaleY(1.2); opacity: 0; }
    }

    /* ─── Flame — enhanced layers ─── */
    .flame {
      position: relative;
      width: 76px;
      height: 140px;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      transform-origin: bottom center;
      transition: opacity 500ms ease, transform 400ms cubic-bezier(0.34,1.56,0.64,1);
      will-change: transform, opacity;
    }

    .flame.extinguished {
      opacity: 0;
      transform: scale(0.2);
    }

    .flame-layer {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      will-change: transform;
      mix-blend-mode: screen;
    }

    /* Enhanced flame layers with turbulence and blue base edges */
    .fl-layer-1 {
      width: 76px;
      height: 140px;
      animation: flSway 3.1s ease-in-out infinite, flFlicker 0.68s ease-in-out infinite;
      filter: blur(0.8px) url(#flameTurbulence);
      opacity: 0.52;
      z-index: 1;
    }

    .flame::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 30px;
      height: 20px;
      background: radial-gradient(ellipse at 50% 50%, rgba(100,180,255,0.4), rgba(80,120,255,0.2), transparent 70%);
      border-radius: 50%;
      z-index: 6;
      animation: blueBasePulse 2.2s ease-in-out infinite;
      transition: opacity 500ms ease;
    }

    .flame.extinguished::after {
      opacity: 0;
    }

    @keyframes blueBasePulse {
      0%,100% { opacity: 0.8; transform: translateX(-50%) scale(1); }
      50% { opacity: 1; transform: translateX(-50%) scale(1.1); }
    }

    .fl-layer-2 {
      width: 58px;
      height: 126px;
      bottom: 0;
      animation: flSway 2.7s ease-in-out infinite 0.07s, flFlicker 0.62s ease-in-out infinite 0.035s;
      filter: blur(0.35px) url(#flameTurbulence);
      opacity: 0.82;
      z-index: 2;
    }

    .fl-layer-3 {
      width: 40px;
      height: 108px;
      bottom: 0;
      animation: flSway 2.4s ease-in-out infinite 0.14s, flFlicker 0.58s ease-in-out infinite 0.075s;
      opacity: 0.94;
      filter: url(#flameTurbulence);
      z-index: 3;
    }

    .fl-layer-4 {
      width: 20px;
      height: 82px;
      bottom: 2px;
      animation: flSway 2.1s ease-in-out infinite 0.19s, flFlicker 0.52s ease-in-out infinite 0.115s;
      filter: url(#flameTurbulence);
      z-index: 4;
    }

    .fl-layer-5 {
      width: 11px;
      height: 32px;
      bottom: 0;
      animation: flSway 1.7s ease-in-out infinite 0.24s, flFlicker 0.42s ease-in-out infinite 0.045s;
      opacity: 0.92;
      filter: url(#flameTurbulence);
      z-index: 5;
    }

    /* Heat haze style */
    .heat-haze {
      position: absolute;
      top: 20%;
      left: 50%;
      transform: translateX(-50%);
      width: 150px;
      height: 300px;
      filter: url(#heatHaze);
      pointer-events: none;
      z-index: 1;
      opacity: 0.15;
      transition: opacity 500ms ease;
    }

    .heat-haze.extinguished {
      opacity: 0;
    }

    @keyframes flSway {
      0%   { transform: translateX(-50%) rotate(0deg) scaleY(1) scaleX(1); }
      16%  { transform: translateX(calc(-50% - 5px)) rotate(-2.4deg) scaleY(1.05) scaleX(0.95); }
      36%  { transform: translateX(calc(-50% + 4px)) rotate(1.7deg) scaleY(0.95) scaleX(1.04); }
      56%  { transform: translateX(calc(-50% - 2.5px)) rotate(-1.1deg) scaleY(1.03) scaleX(0.97); }
      76%  { transform: translateX(calc(-50% + 5px)) rotate(1.9deg) scaleY(0.96) scaleX(1.03); }
      100% { transform: translateX(-50%) rotate(0deg) scaleY(1) scaleX(1); }
    }

    @keyframes flFlicker {
      0%,100% { transform: translateX(-50%) scaleY(1) scaleX(1); }
      11%  { transform: translateX(-50%) scaleY(1.12) scaleX(0.9); }
      27%  { transform: translateX(-50%) scaleY(0.92) scaleX(1.07); }
      40%  { transform: translateX(-50%) scaleY(1.08) scaleX(0.93); }
      54%  { transform: translateX(-50%) scaleY(0.95) scaleX(1.05); }
      66%  { transform: translateX(-50%) scaleY(1.06) scaleX(0.96); }
      79%  { transform: translateX(-50%) scaleY(0.93) scaleX(1.06); }
      90%  { transform: translateX(-50%) scaleY(1.04) scaleX(0.98); }
    }

    .flame-bloom {
      position: absolute;
      bottom: -18px;
      left: 50%;
      transform: translateX(-50%);
      width: 100px;
      height: 100px;
      background: radial-gradient(circle,
        rgba(255,235,170,0.98) 0%,
        rgba(255,185,85,0.73) 20%,
        rgba(255,135,45,0.42) 40%,
        rgba(225,85,22,0.16) 60%,
        transparent 80%
      );
      border-radius: 50%;
      pointer-events: none;
      animation: bloomPulse 2.7s ease-in-out infinite;
      transition: opacity 500ms ease;
      z-index: 6;
      mix-blend-mode: screen;
    }

    .flame-bloom.extinguished { opacity: 0; animation: none; }

    @keyframes bloomPulse {
      0%,100% { opacity: 0.87; transform: translateX(-50%) scale(1); }
      50%  { opacity: 1;    transform: translateX(-50%) scale(1.14); }
    }

    /* ─── Wick ─── */
    .wick {
      position: absolute;
      bottom: -23px;
      left: 50%;
      transform: translateX(-50%);
      width: 3.5px;
      height: 22px;
      z-index: 10;
    }

    .wick-shaft {
      width: 100%;
      height: 100%;
      background: linear-gradient(to top,
        #0f0a05 0%,
        #1a1408 30%,
        #252010 60%,
        #1a1510 100%
      );
      border-radius: 1px;
    }

    .wick-tip {
      position: absolute;
      top: -4.5px;
      left: 50%;
      transform: translateX(-50%);
      width: 6px;
      height: 8px;
      background: radial-gradient(circle at 40% 30%, #ff8428 0%, #ea5818 50%, #8f2200 100%);
      border-radius: 50% 50% 30% 30%;
      box-shadow:
        0 0 5px 1.5px rgba(255,145,35,0.95),
        0 0 12px 4px rgba(255,105,12,0.55),
        0 0 24px 8px rgba(255,75,0,0.28);
      animation: ember 1.1s ease-in-out infinite;
      transition: opacity 400ms ease 200ms, background 300ms ease, box-shadow 300ms ease;
    }

    .wick-tip.extinguished {
      opacity: 0;
      box-shadow: none;
      background: #0a0805;
      animation: none;
    }

    @keyframes ember {
      0%,100% {
        box-shadow: 0 0 5px 1.5px rgba(255,145,35,0.95), 0 0 12px 4px rgba(255,105,12,0.55), 0 0 24px 8px rgba(255,75,0,0.28);
        transform: translateX(-50%) scale(1);
      }
      50% {
        box-shadow: 0 0 7px 2.5px rgba(255,165,45,1), 0 0 16px 6px rgba(255,125,22,0.62), 0 0 32px 10px rgba(255,85,5,0.32);
        transform: translateX(-50%) scale(1.12);
      }
    }

    /* ─── Enhanced Candle Body with noise texture ─── */
    .candle-body {
      position: relative;
      width: 78px;
      height: 185px;
      background:
        /* Noise texture using SVG filter */
        url("data:image/svg+xml,%3Csvg viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n' x='0' y='0'%3E%3CfeTurbulence baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3CfeColorMatrix type='saturate' values='0'/%3E%3C/filter%3E%3Crect width='100' height='100' filter='url(%23n)' opacity='0.25'/%3E%3C/svg%3E"),
        linear-gradient(100deg,
          rgba(255,255,255,0.2) 0%,
          transparent 25%,
          transparent 70%,
          rgba(0,0,0,0.14) 100%
        ),
        linear-gradient(95deg,
          #f7e6c4 0%,
          #efddba 18%,
          #e6d2ae 38%,
          #d7c298 58%,
          #c8b082 78%,
          #b8a06e 100%
        );
      border-radius: 4px 4px 7px 7px;
      box-shadow:
        inset -16px 0 26px rgba(0,0,0,0.11),
        inset 5px 0 12px rgba(255,255,255,0.26),
        0 0 34px 10px rgba(255,160,60,0.08),
        0 22px 66px rgba(0,0,0,0.72),
        0 7px 22px rgba(0,0,0,0.42);
      overflow: visible;
    }

    /* Small wax imperfections */
    .wax-imperfection {
      position: absolute;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.15), transparent 70%);
      opacity: 0.6;
    }

    .imperfection-1 {
      top: 60px;
      left: 15px;
      width: 8px;
      height: 6px;
    }

    .imperfection-2 {
      top: 100px;
      right: 12px;
      width: 6px;
      height: 5px;
    }

    .imperfection-3 {
      top: 140px;
      left: 25px;
      width: 5px;
      height: 4px;
    }

    .candle-body::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 45px;
      background: radial-gradient(ellipse at 50% 20%,
        rgba(255,250,235,0.7) 0%,
        rgba(255,245,220,0.45) 22%,
        rgba(255,235,200,0.25) 45%,
        transparent 72%
      );
      border-radius: 4px 4px 0 0;
      pointer-events: none;
    }

    /* Dynamic wax reflection shimmer */
    .candle-body::after {
      content: '';
      position: absolute;
      top: 20px;
      left: 8px;
      width: 18px;
      height: 100px;
      background: linear-gradient(to bottom,
        rgba(255,255,255,0.3) 0%,
        rgba(255,255,255,0.1) 40%,
        rgba(255,255,255,0.03) 70%,
        transparent 100%
      );
      border-radius: 50%;
      filter: blur(2.5px);
      animation: waxShimmer 7s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes waxShimmer {
      0%,100% { transform: translateY(0) scaleY(1); opacity: 1; }
      50% { transform: translateY(6px) scaleY(0.95); opacity: 0.78; }
    }

    /* ─── Enhanced Melt Pool with Ripples ─── */
    .melt-pool {
      position: absolute;
      top: -4px;
      left: 3px;
      right: 3px;
      height: 14px;
      background: radial-gradient(ellipse at 50% 40%,
        rgba(255,254,246,0.98) 0%,
        rgba(248,236,214,0.95) 32%,
        rgba(234,220,192,0.91) 60%,
        rgba(220,205,178,0.86) 100%
      );
      border-radius: 50%;
      box-shadow:
        inset 0 4px 10px rgba(255,255,255,0.65),
        inset 0 -3px 7px rgba(0,0,0,0.1),
        0 3px 10px rgba(0,0,0,0.18);
      animation: meltPoolPulse 4.2s ease-in-out infinite;
      overflow: hidden;
    }

    /* Subtle melt pool ripples */
    .melt-ripple {
      position: absolute;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.25);
      animation: rippleAnim 3s ease-in-out infinite;
    }

    .ripple-1 {
      top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 60%; height: 40%;
      animation-delay: 0s;
    }

    .ripple-2 {
      top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 80%; height: 60%;
      animation-delay: 1s;
    }

    @keyframes rippleAnim {
      0%,100% { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
      50% { opacity: 0.6; transform: translate(-50%, -50%) scale(1.1); }
    }

    @keyframes meltPoolPulse {
      0%,100% { transform: scaleY(1) scaleX(1); }
      50% { transform: scaleY(0.98) scaleX(1.02); }
    }

    /* ─── Wax Drips — enhanced with more drips and better physics ─── */
    .wax-drip {
      position: absolute;
      border-radius: 0 0 50% 50%;
      background: linear-gradient(to bottom,
        #e6d8b8 0%,
        #d2c09a 40%,
        #c0ae84 100%
      );
      box-shadow: inset -2.5px 0 6px rgba(0,0,0,0.14);
    }

    .drip-1 {
      top: 0;
      left: 10%;
      width: 10px;
      height: 46px;
      animation: dripAnim 20s ease-in-out infinite;
    }

    .drip-2 {
      top: 0;
      right: 16%;
      width: 8px;
      height: 60px;
      animation: dripAnim 26s ease-in-out infinite 5s;
    }

    .drip-3 {
      top: 0;
      left: 48%;
      width: 7px;
      height: 30px;
      animation: dripAnim 16s ease-in-out infinite 11s;
    }

    .drip-4 {
      top: 0;
      right: 38%;
      width: 6px;
      height: 24px;
      animation: dripAnim 22s ease-in-out infinite 7s;
    }

    .drip-5 {
      top: 0;
      left: 32%;
      width: 5px;
      height: 18px;
      animation: dripAnim 24s ease-in-out infinite 13s;
    }

    .drip-6 {
      top: 0;
      right: 26%;
      width: 9px;
      height: 72px;
      animation: dripAnim 30s ease-in-out infinite 2s;
    }

    .drip-7 {
      top: 0;
      left: 62%;
      width: 6px;
      height: 38px;
      animation: dripAnim 18s ease-in-out infinite 9s;
    }

    .drip-8 {
      top: 0;
      right: 58%;
      width: 4px;
      height: 22px;
      animation: dripAnim 28s ease-in-out infinite 15s;
    }

    @keyframes dripAnim {
      0%   { transform: translateY(-100%) scaleY(0.35); opacity: 0; }
      5%   { transform: translateY(-100%) scaleY(1); opacity: 1; }
      98%  { transform: translateY(20px) scaleY(1.1); opacity: 1; }
      100% { transform: translateY(22px) scaleY(1.1); opacity: 1; }
    }

    /* ─── Dust motes in candlelight ─── */
    .dust-motes {
      position: absolute;
      top: -120px;
      left: -100px;
      width: 280px;
      height: 280px;
      pointer-events: none;
      opacity: 0.55;
      transition: opacity 600ms ease;
    }

    .dust-motes.extinguished { opacity: 0; }

    .dust-mote {
      position: absolute;
      background: radial-gradient(circle at center,
        rgba(255,230,170,0.75) 0%,
        rgba(255,200,120,0.35) 40%,
        transparent 70%
      );
      border-radius: 50%;
      animation: dustFloat forwards infinite;
    }

    @keyframes dustFloat {
      0% { opacity: 0; transform: translate(0,0) scale(0.4); }
      10% { opacity: 0.85; transform: translate(var(--dx1), var(--dy1)) scale(var(--s1)); }
      35% { opacity: 1; transform: translate(var(--dx2), var(--dy2)) scale(var(--s2)); }
      70% { opacity: 0.45; transform: translate(var(--dx3), var(--dy3)) scale(var(--s3)); }
      100% { opacity: 0; transform: translate(var(--dx4), var(--dy4)) scale(var(--s4)); }
    }

    /* ─── Smoke Container (extinguish smoke) ─── */
    .smoke-container {
      position: absolute;
      top: -10px;
      left: 50%;
      transform: translateX(-50%);
      width: 80px;
      height: 180px;
      pointer-events: none;
      overflow: visible;
      z-index: 20;
    }

    .smoke-particle {
      position: absolute;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%,
        rgba(210,200,190,0.72),
        rgba(180,170,160,0.42) 45%,
        rgba(140,130,120,0.16) 70%,
        transparent 100%
      );
      opacity: 0;
      animation: smokeRise forwards;
      will-change: transform, opacity;
    }

    @keyframes smokeRise {
      0%   { opacity: 0; transform: translateY(0) translateX(0) scale(0.3) rotate(0deg); filter: blur(0px); }
      12%  { opacity: 0.8; filter: blur(1px); }
      50%  { opacity: 0.48; transform: translateY(-58px) translateX(var(--dx)) scale(0.82) rotate(12deg); filter: blur(2.2px); }
      80%  { opacity: 0.22; transform: translateY(-108px) translateX(calc(var(--dx) * 1.45)) scale(1.15) rotate(-6deg); filter: blur(3.3px); }
      100% { opacity: 0; transform: translateY(-170px) translateX(calc(var(--dx) * 1.65)) scale(1.45) rotate(4deg); filter: blur(5.5px); }
    }

    /* ─── Controls ─── */
    .controls {
      position: fixed;
      bottom: calc(28vh + 24px);
      left: 50%;
      transform: translateX(-50%);
      z-index: 30;
    }

    .btn {
      padding: 11px 30px;
      font-family: 'DM Sans', system-ui, sans-serif;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.03em;
      color: #f0e4d0;
      background: rgba(30, 22, 14, 0.75);
      border: 1px solid rgba(255, 220, 160, 0.12);
      border-radius: 24px;
      cursor: pointer;
      backdrop-filter: blur(8px);
      transition: background 200ms ease, transform 150ms ease, box-shadow 200ms ease;
      outline: none;
    }

    .btn:hover {
      background: rgba(50, 38, 22, 0.85);
      box-shadow: 0 4px 20px rgba(255,170,60,0.12);
    }

    .btn:active { transform: scale(0.97); }

    .btn:focus-visible {
      box-shadow: 0 0 0 2px rgba(30,22,14,0.9), 0 0 0 4px rgba(255,180,80,0.6);
    }

    /* Reduced motion */
    @media (prefers-reduced-motion: reduce) {
      .flame-layer, .flame-bloom, .candle-flicker-shadow,
      .ambient-glow, .dust-motes, .wax-drip, .melt-pool,
      .candle-body::after, .continuous-smoke-particle {
        animation: none;
      }
      .flame { transition: none; }
      .flame.extinguished { transform: scale(0); }
    }
  </style>
</head>
<body>
  <!-- Noise texture SVG filter -->
  <svg class="texture-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <filter id="waxNoise" x="0" y="0" width="100%" height="100%">
      <feTurbulence baseFrequency="0.7" numOctaves="3" stitchTiles="stitch" />
      <feColorMatrix type="saturate" values="0" />
    </filter>
    <filter id="flameTurbulence">
      <feTurbulence id="turb" baseFrequency="0.01 0.02" numOctaves="2" seed="1" />
      <feDisplacementMap in="SourceGraphic" scale="8" />
    </filter>
    <filter id="heatHaze">
      <feTurbulence baseFrequency="0.01 0.03" numOctaves="1" seed="2">
        <animate attributeName="baseFrequency" values="0.01 0.03;0.02 0.05;0.01 0.03" dur="3s" repeatCount="indefinite" />
      </feTurbulence>
      <feDisplacementMap in="BackgroundImage" scale="3" />
    </filter>
  </svg>

  <!-- Heat haze above flame -->
  <div class="heat-haze" id="heatHaze"></div>
  <!-- Dynamic wall shadows -->
  <div class="wall-shadows" id="wallShadows"></div>

  <div class="surface"></div>
  <div class="candle-flicker-shadow" id="candleShadow"></div>
  <div class="ambient-glow" id="ambientGlow"></div>

  <div class="smoke-container" id="smokeContainer"></div>

  <div class="candle-assembly">
    <div class="flame-area">
      <!-- Continuous wispy smoke while burning -->
      <div class="continuous-smoke" id="continuousSmoke">
        <div class="continuous-smoke-particle"></div>
        <div class="continuous-smoke-particle"></div>
        <div class="continuous-smoke-particle"></div>
      </div>

      <!-- Dust motes in candlelight -->
      <div class="dust-motes" id="dustMotes"></div>

      <!-- The Flame — 5 enhanced layers -->
      <div class="flame" id="flame">
        <div class="flame-bloom" id="flameBloom"></div>

        <div class="flame-layer fl-layer-1" id="flameLayer1">
          <svg viewBox="0 0 80 140" width="80" height="140">
            <defs>
              <linearGradient id="g1" x1="0" y1="1" x2="0" y2="0">
                <stop offset="0%"   stop-color="#cc1f00" stop-opacity="0.85"/>
                <stop offset="40%"  stop-color="#ea6020"/>
                <stop offset="75%"  stop-color="#ff8822"/>
                <stop offset="100%" stop-color="#ffb032" stop-opacity="0.22"/>
              </linearGradient>
            </defs>
            <path d="M40,140 C40,140 5.5,98 9.5,63 C13.5,36 25.5,10 40,0 C54.5,10 66.5,36 70.5,63 C74.5,98 40,140 40,140 Z" id="flamePath1"
              fill="url(#g1)"/>
          </svg>
        </div>

        <div class="flame-layer fl-layer-2" id="flameLayer2">
          <svg viewBox="0 0 80 140" width="80" height="140">
            <defs>
              <linearGradient id="g2" x1="0" y1="1" x2="0" y2="0">
                <stop offset="0%"   stop-color="#e04000"/>
                <stop offset="35%"  stop-color="#ff7022"/>
                <stop offset="70%"  stop-color="#ffb232"/>
                <stop offset="100%" stop-color="#ffd255" stop-opacity="0.12"/>
              </linearGradient>
            </defs>
            <path d="M40,140 C40,140 5.5,98 9.5,63 C13.5,36 25.5,10 40,0 C54.5,10 66.5,36 70.5,63 C74.5,98 40,140 40,140 Z" id="flamePath2"
              fill="url(#g2)"/>
          </svg>
        </div>

        <div class="flame-layer fl-layer-3" id="flameLayer3">
          <svg viewBox="0 0 80 140" width="80" height="140">
            <defs>
              <linearGradient id="g3" x1="0" y1="1" x2="0" y2="0">
                <stop offset="0%"   stop-color="#ff8a00"/>
                <stop offset="40%"  stop-color="#ffc025"/>
                <stop offset="75%"  stop-color="#fff08f"/>
                <stop offset="100%" stop-color="#ffffff" stop-opacity="0.05"/>
              </linearGradient>
            </defs>
            <path d="M40,140 C40,140 5.5,98 9.5,63 C13.5,36 25.5,10 40,0 C54.5,10 66.5,36 70.5,63 C74.5,98 40,140 40,140 Z" id="flamePath3"
              fill="url(#g3)"/>
          </svg>
        </div>

        <div class="flame-layer fl-layer-4" id="flameLayer4">
          <svg viewBox="0 0 80 140" width="80" height="140">
            <defs>
              <radialGradient id="g4" cx="50%" cy="85%" r="55%">
                <stop offset="0%"   stop-color="#ffffff"/>
                <stop offset="30%"  stop-color="#fffae0"/>
                <stop offset="65%"  stop-color="#ffe888"/>
                <stop offset="100%" stop-color="#ffcc00" stop-opacity="0"/>
              </radialGradient>
            </defs>
            <path d="M40,140 C40,140 5.5,98 9.5,63 C13.5,36 25.5,10 40,0 C54.5,10 66.5,36 70.5,63 C74.5,98 40,140 40,140 Z" id="flamePath4"
              fill="url(#g4)"/>
          </svg>
        </div>

        <div class="flame-layer fl-layer-5" id="flameLayer5">
          <svg viewBox="0 0 80 140" width="80" height="140">
            <defs>
              <linearGradient id="g5" x1="0" y1="1" x2="0" y2="0">
                <stop offset="0%"   stop-color="#1a6aff" stop-opacity="0.92"/>
                <stop offset="50%"  stop-color="#469aff" stop-opacity="0.72"/>
                <stop offset="100%" stop-color="#89ceff" stop-opacity="0.22"/>
              </linearGradient>
            </defs>
            <path d="M40,140 C40,140 5.5,98 9.5,63 C13.5,36 25.5,10 40,0 C54.5,10 66.5,36 70.5,63 C74.5,98 40,140 40,140 Z" id="flamePath5"
              fill="url(#g5)"/>
          </svg>
        </div>
      </div>

      <!-- Wick -->
      <div class="wick">
        <div class="wick-shaft"></div>
        <div class="wick-tip" id="wickTip"></div>
      </div>
    </div>

    <!-- Candle Body -->
    <div class="candle-body">
      <div class="melt-pool">
        <div class="melt-ripple ripple-1"></div>
        <div class="melt-ripple ripple-2"></div>
      </div>
      <div class="wax-drip drip-1"></div>
      <div class="wax-drip drip-2"></div>
      <div class="wax-drip drip-3"></div>
      <div class="wax-drip drip-4"></div>
      <div class="wax-drip drip-5"></div>
      <div class="wax-drip drip-6"></div>
      <div class="wax-drip drip-7"></div>
      <div class="wax-drip drip-8"></div>
      <div class="wax-imperfection imperfection-1"></div>
      <div class="wax-imperfection imperfection-2"></div>
      <div class="wax-imperfection imperfection-3"></div>
    </div>

    <!-- Candle Holder -->
    <div class="candle-holder">
      <div class="holder-drip-catch"></div>
      <div class="holder-base"></div>
    </div>
  </div>

  <div class="controls">
    <button class="btn" id="toggleBtn">Put Out</button>
  </div>

  <script>
    (function() {
      const flame        = document.getElementById('flame');
      const flameBloom   = document.getElementById('flameBloom');
      const wickTip      = document.getElementById('wickTip');
      const continuousSmoke = document.getElementById('continuousSmoke');
      const ambientGlow  = document.getElementById('ambientGlow');
      const candleShadow = document.getElementById('candleShadow');
      const dustMotes    = document.getElementById('dustMotes');
      const smokeContainer = document.getElementById('smokeContainer');
      const toggleBtn    = document.getElementById('toggleBtn');
      const heatHaze     = document.getElementById('heatHaze');
      const wallShadows  = document.getElementById('wallShadows');
      const turbulenceFilter = document.getElementById('turb');
      const flamePaths   = [
        document.getElementById('flamePath1'),
        document.getElementById('flamePath2'),
        document.getElementById('flamePath3'),
        document.getElementById('flamePath4'),
        document.getElementById('flamePath5')
      ];

      let state = 'burning';
      let busy = false;
      let lastTime = 0;

      // Function to generate slightly random flame path
      function generateFlamePath(baseHeight, variation) {
        const randomize = (val, range) => val + (Math.random() - 0.5) * range;
        const y0 = baseHeight;
        const x0 = 40;
        const cp1x = randomize(9.5, 3);
        const cp1y = randomize(63, 5);
        const cp2x = randomize(25.5, 3);
        const cp2y = randomize(36, 4);
        const topX = randomize(40, 2);
        const topY = randomize(0, 3);
        const cp3x = randomize(54.5, 3);
        const cp3y = randomize(36, 4);
        const cp4x = randomize(70.5, 3);
        const cp4y = randomize(63, 5);
        return `M${x0},${y0} C${x0},${y0} ${cp1x},${cp1y + 35} ${cp1x},${cp1y} C${cp2x},${cp2y} ${cp2x},${cp2y} ${topX},${topY} C${cp3x},${cp2y} ${cp4x},${cp4y} ${cp4x},${cp4y} C${cp4x},${cp4y + 35} ${x0},${y0} ${x0},${y0} Z`;
      }

      // Animate flame with dynamic shape changes and turbulence
      function animateFlame(timestamp) {
        if (!lastTime) lastTime = timestamp;
        const delta = timestamp - lastTime;
        if (delta > 80 && state === 'burning') {
          flamePaths.forEach((path, i) => {
            const variation = 2 + i * 0.5;
            path.setAttribute('d', generateFlamePath(140, variation));
          });
          // Animate turbulence filter for more natural flame movement
          const turbX = 0.01 + Math.random() * 0.015;
          const turbY = 0.02 + Math.random() * 0.025;
          turbulenceFilter.setAttribute('baseFrequency', `${turbX} ${turbY}`);
          // Subtle ambient glow flicker with color temperature shift
          const glowScale = 1 + (Math.random() - 0.5) * 0.08;
          const glowOpacity = 0.85 + (Math.random() - 0.5) * 0.15;
          const hueShift = Math.floor((Math.random() - 0.5) * 10);
          ambientGlow.style.transform = `translateX(-50%) scale(${glowScale})`;
          ambientGlow.style.opacity = glowOpacity;
          ambientGlow.style.filter = `hue-rotate(${hueShift}deg)`;
          lastTime = timestamp;
        }
        requestAnimationFrame(animateFlame);
      }

      function initDustMotes() {
        const count = 12;
        for (let i = 0; i < count; i++) {
          const p = document.createElement('div');
          p.className = 'dust-mote';
          const size = 2 + Math.random() * 3;
          const x = 20 + Math.random() * 240;
          const y = 20 + Math.random() * 240;
          const dur = 8 + Math.random() * 14;
          p.style.cssText = `
            width: ${size}px;
            height: ${size}px;
            left: ${x}px;
            top: ${y}px;
            --dx1: ${(Math.random()-0.5)*40}px; --dy1: ${-(5 + Math.random()*20)}px; --s1: ${0.8 + Math.random()*0.5};
            --dx2: ${(Math.random()-0.5)*80}px; --dy2: ${-(20 + Math.random()*40)}px; --s2: ${0.7 + Math.random()*0.6};
            --dx3: ${(Math.random()-0.5)*120}px; --dy3: ${-(40 + Math.random()*60)}px; --s3: ${0.9 + Math.random()*0.7};
            --dx4: ${(Math.random()-0.5)*160}px; --dy4: ${-(70 + Math.random()*80)}px; --s4: ${1.2 + Math.random()*0.8};
            animation-duration: ${dur}s;
            animation-delay: ${-(Math.random()*dur)}s;
          `;
          dustMotes.appendChild(p);
        }
      }

      function toggle() {
        if (busy) return;
        busy = true;
        if (state === 'burning') extinguish();
        else relight();
      }

      function extinguish() {
        flame.classList.add('extinguished');
        flameBloom.classList.add('extinguished');
        wickTip.classList.add('extinguished');
        continuousSmoke.classList.add('extinguished');
        ambientGlow.classList.add('extinguished');
        candleShadow.classList.add('extinguished');
        dustMotes.classList.add('extinguished');
        heatHaze.classList.add('extinguished');
        wallShadows.classList.add('extinguished');
        toggleBtn.textContent = 'Light Candle';
        state = 'extinguished';
        spawnSmoke();
        setTimeout(() => { busy = false; }, 700);
      }

      function relight() {
        flame.classList.remove('extinguished');
        flameBloom.classList.remove('extinguished');
        wickTip.classList.remove('extinguished');
        continuousSmoke.classList.remove('extinguished');
        ambientGlow.classList.remove('extinguished');
        candleShadow.classList.remove('extinguished');
        dustMotes.classList.remove('extinguished');
        heatHaze.classList.remove('extinguished');
        wallShadows.classList.remove('extinguished');
        toggleBtn.textContent = 'Put Out';
        state = 'burning';
        setTimeout(() => { busy = false; }, 600);
      }

      function spawnSmoke() {
        const count = 20;
        for (let i = 0; i < count; i++) {
          setTimeout(() => {
            const p = document.createElement('div');
            p.className = 'smoke-particle';
            const size = 16 + Math.random() * 24;
            const dx   = (Math.random() - 0.5) * 80;
            const dur  = 3.4 + Math.random() * 1.8;
            const startX = (Math.random() - 0.5) * 45;
            p.style.cssText = `
              width: ${size}px;
              height: ${size}px;
              left: calc(50% + ${startX}px);
              bottom: ${22 + Math.random() * 22}px;
              --dx: ${dx}px;
              animation-duration: ${dur}s;
            `;
            smokeContainer.appendChild(p);
            setTimeout(() => p.remove(), (dur + 0.6) * 1000);
          }, i * 85);
        }
      }

      toggleBtn.addEventListener('click', toggle);
      toggleBtn.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); toggle(); }
      });

      initDustMotes();
      requestAnimationFrame(animateFlame);
    })();
  </script>
</body>
</html>
